<body>
    <div class="app-container">

    <script>
        function haptic(style = 'light') {
            if (navigator.vibrate) navigator.vibrate(style === 'heavy' ? 100 : 30);
        }

        let audioCtx = null;
        function playTone(freq, dur, vol = 0.1) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
                const osc = audioCtx.createOscillator();
                osc.type = 'sine'; osc.frequency.value = freq;
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(now + dur);
            } catch(e) {}
        }
        
        function showBreathing() {
            const container = document.getElementById('optionsContainer');
            const existing = container.querySelector('.video-container');
            if (existing) existing.remove();
            const div = document.createElement('div');
            div.className = 'video-container';
            div.innerHTML = `<div style="font-size:48px">🌊</div><div id="breathText" style="font-size:20px;font-weight:600;margin:10px;color:#a7f3d0">Вдох...</div><div id="breathCount" style="font-size:32px;font-weight:700;margin:5px;color:#10b981">3</div><button class="action-btn" style="margin-top:8px" onclick="this.parentElement.remove()">✖ Закрыть</button>`;
            container.prepend(div);
            let count = 3;
            const textEl = div.querySelector('#breathText'), countEl = div.querySelector('#breathCount');
            const interval = setInterval(() => {
                count--;
                if (count > 0) { textEl.innerText = count % 2 === 0 ? 'Вдох...' : 'Выдох...'; countEl.innerText = count; }
                else { clearInterval(interval); textEl.innerText = '✨ Дыши спокойно'; countEl.innerText = '❤️'; playTone(523, 0.8); }
            }, 1200);
        }

        // ========== ИИ-ПОМОЩНИК ==========
        
        const aiResponses = {
            'привет': 'Привет! 👋 Я здесь, чтобы помочь. Что тебя беспокоит?',
            'здравствуй': 'Здравствуй! 👋 Расскажи, что случилось, я постараюсь помочь.',
            'что такое буллинг': 'Буллинг — это когда кто-то специально и регулярно обижает, унижает или игнорирует другого человека. Это НЕ твоя вина. Ты заслуживаешь уважения и безопасности. ❤️',
            'меня обижают': 'Мне очень жаль, что ты через это проходишь. Это не твоя вина. 🫂 Ты можешь: 1) Сохранить скриншоты 2) Рассказать взрослому 3) Позвонить 8-800-2000-122',
            'я боюсь': 'Бояться — это нормально. 🫂 Ты уже сделал важный шаг — попросил помощи. Давай подумаем, кому ты можешь довериться?',
            'учитель кричит': 'Если учитель кричит или ругает — это неприятно и может быть страшно. 🫂 Ты имеешь право на уважение. Попробуй: 1) Не отвечать грубостью 2) Спокойно сказать «Пожалуйста, не кричите» 3) Обсудить это с родителями или завучем позже.',
            'учитель ругает': 'Если учитель ругает незаслуженно — это обидно. 🫂 Постарайся не принимать близко к сердцу. Если это происходит постоянно — это проблема. Расскажи родителям или школьному психологу.',
            'кричат': 'Когда на тебя кричат — это неприятно. Ты не обязан это терпеть. Расскажи кому-то из взрослых, кому доверяешь (родители, другой учитель, психолог).',
            'как сказать учителю': 'Скажи спокойно и чётко: «Меня обижают, мне нужна помощь». 🫶 Можно написать записку, если страшно говорить. Учитель обязан отреагировать.',
            'учитель не помогает': 'Если учитель не реагирует — расскажи другому учителю, завучу, директору или школьному психологу. Можно позвонить родителям или на 8-800-2000-122.',
            'боюсь сказать учителю': 'Бояться — нормально. 🫂 Попробуй: 1) Написать записку и положить на стол 2) Попросить друга передать 3) Поговорить после урока. Ты имеешь право на защиту.',
            'кибербуллинг': 'Кибербуллинг — это травля в интернете. Сохраняй скриншоты, не отвечай агрессору, расскажи взрослому. Ты не один. 💙',
            'оскорбления в интернете': 'Оскорбления в сети — это кибербуллинг. 📱 Не отвечай (это «топливо»), сделай скриншоты, заблокируй агрессора, расскажи родителям.',
            'злые комментарии': 'Злые комментарии — это форма кибербуллинга. 💔 Ты не обязан их читать. Скрой комментарии, сделай скрин, расскажи взрослому.',
            'мои права': 'Ты имеешь право на безопасность, уважение и защиту от буллинга. За травлю предусмотрена ответственность по закону (ст. 5.61 КоАП, ст. 110.1 УК РФ).',
            'закон': 'По закону оскорбления, угрозы и травля — это правонарушения. 📜 Ты имеешь право на защиту. Обратись к родителям, в школу или на 8-800-2000-122.',

            'телефон': '📞 Детский телефон доверия: 8-800-2000-122 (круглосуточно, анонимно, бесплатно). 🚨 112 — угроза жизни. ⚠️ 123 — прокуратура.',
            'куда позвонить': '📞 8-800-2000-122 — детский телефон доверия. 🚨 112 — если есть угроза жизни. ⚠️ 123 — прокуратура. Все звонки бесплатные.',

        };
        
        const aiKeywords = [
            { keywords: ['учитель кричит', 'учитель ругает', 'кричит учитель', 'ругает учитель'], response: 'учитель кричит' },
            { keywords: ['кричат', 'орут', 'накричали', 'крик', 'орёт'], response: 'кричат' },
            { keywords: ['учитель', 'педагог', 'преподаватель', 'классный'], response: 'учитель не помогает' },
            { keywords: ['сказать учителю', 'поговорить с учителем'], response: 'как сказать учителю' },
            { keywords: ['кибербуллинг', 'интернет', 'чат', 'комментарии', 'фото', 'фейк', 'тролль', 'онлайн'], response: 'кибербуллинг' },
            { keywords: ['оскорбления', 'оскорбляют'], response: 'оскорбления в интернете' },
            { keywords: ['злые комментарии', 'негатив', 'пишут гадости'], response: 'злые комментарии' },
            { keywords: ['права', 'закон', 'полиция', 'жалоба', 'заявление'], response: 'мои права' },
            { keywords: ['телефон', 'позвонить', 'номер', 'звонок'], response: 'телефон' },
            { keywords: ['психолог', 'помощь психолога'], response: 'психолог' },
            { keywords: ['буллинг', 'травля', 'обижают', 'издеваются', 'унижают'], response: 'что такое буллинг' },
            { keywords: ['боюсь', 'страшно', 'тревожно', 'переживаю'], response: 'я боюсь' },
        ];
        
        function findAIResponse(userText) {
            const lowerText = userText.toLowerCase().trim();
            
            if (lowerText.includes('суицид') || lowerText.includes('умереть') || lowerText.includes('убью себя')) {
                return '💙 Пожалуйста, позвони прямо сейчас: 8-800-2000-122 или 112. Твоя жизнь важна. Ты не один.';
            }
            
            for (const item of aiKeywords) {
                for (const kw of item.keywords) {
                    if (lowerText.includes(kw)) {
                        return aiResponses[item.response] || aiResponses['помоги'];
                    }
                }
            }
            
            for (const key of Object.keys(aiResponses)) {
                if (lowerText === key || lowerText.includes(key)) {
                    return aiResponses[key];
                }
            }
            
            return 'Я понимаю, что тебе непросто. 🫂 Попробуй описать ситуацию подробнее: что происходит? Кто тебя обижает? Или выбери тему из списка выше.';
        }
        
        function showAIModule() {
            const container = document.getElementById('optionsContainer');
            container.innerHTML = `
                <div class="ai-chat-container">

        function startModule(modName) {
            currentMod = modName;
            currentData = modules[modName];
            currentNode = currentData.start;
            renderNode();
        }
        
        function renderNode() {
            if (!currentData || !currentNode) return;
            const node = currentData.nodes[currentNode];
            if (!node) return;
            if (node.vib) haptic('heavy');
            if (node.vid) showBreathing();
            optDiv.innerHTML = '';
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message-bot';
            msgDiv.innerText = node.t;
            optDiv.appendChild(msgDiv);
            if (node.input === 'text') {
                const ta = document.createElement('textarea');
                ta.placeholder = "Напиши здесь...";
                ta.className = "free-text"; ta.rows = 3;
                const btn = document.createElement('button');
                btn.innerText = "✅ Сохранить";
                btn.className = "action-btn";
                btn.onclick = () => { if (ta.value.trim()) { alert("✨ Спасибо!"); showMenu(); } else alert("Напиши хотя бы одно действие ❤️"); };
                optDiv.appendChild(ta); optDiv.appendChild(btn);
                const menuBtn = document.createElement('button');
                menuBtn.innerText = "🏠 В главное меню";
                menuBtn.className = "back-to-menu";
                menuBtn.onclick = () => showMenu();
                optDiv.appendChild(menuBtn);
                return;
            }
            if (node.o && node.o.length) {
                node.o.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.innerText = opt.x; btn.className = "option-btn";
                    btn.onclick = () => {
                        if (opt.act === 'copy' && opt.p) { navigator.clipboard.writeText(opt.p); alert("📋 Текст скопирован!"); }
                        if (opt.n) { currentNode = opt.n; renderNode(); } else { showMenu(); }
                    };
                    optDiv.appendChild(btn);
                });

                menuBtn.innerText = "🏠 В главное меню";
                menuBtn.className = "back-to-menu";

                menuBtn.className = "action-btn";

            }
